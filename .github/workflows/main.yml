name: Unzip Project Files

on:
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab

jobs:
  unzip-files:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository so the workflow can see your ZIP file
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Unzip the folder into the root directory
      # Replace 'your-project.zip' with the actual name of your ZIP file
      - name: Unzip Archive to Root
        run: |
          unzip your-project.zip -d ./
          rm your-project.zip # Optional: Removes the zip file so it doesn't clutter your repo

      # Step 3: Commit and push the extracted files back to the repository
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Unzipped project files to repository root"
          git push
          
